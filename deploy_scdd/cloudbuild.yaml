# Cloud Build pipeline for dan-rc-data-scdd static site.
#
# Reuses the same Artifact Registry repo (`dan`) as the main DAN service,
# with a distinct image name (dan-rc-data) and a distinct Cloud Run
# service name (dan-rc-data-scdd).

steps:
  # 1. Build the container from the Dockerfile. `dir:` means this step runs
  # inside the deploy_scdd/ subdirectory of the cloned repo, where the
  # Dockerfile, .dockerignore, and site content live.
  - name: gcr.io/cloud-builders/docker
    dir: deploy_scdd
    args:
      - build
      - --tag=us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan-rc-data:$COMMIT_SHA
      - --tag=us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan-rc-data:latest
      - .

  # 2. Push the image to Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    dir: deploy_scdd
    args:
      - push
      - --all-tags
      - us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan-rc-data

  # 3. Deploy to Cloud Run.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    dir: deploy_scdd
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dan-rc-data-scdd
      - --image=us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan-rc-data:$COMMIT_SHA
      - --region=us-west1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=80
      - --timeout=60s

images:
  - us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan-rc-data:$COMMIT_SHA
  - us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan-rc-data:latest

options:
  logging: CLOUD_LOGGING_ONLY
